name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      # Mirrors the backend Dockerfile, which installs deps with uv from the
      # committed uv.lock rather than through the Nix/devenv shell used locally.
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest
